name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build
      - run: npm run test:coverage
      # npm publishing is deferred (.releaserc sets npmPublish:false): this produces
      # the changelog, version bump and GitHub release without publishing to npm, so
      # it needs no npm token. To publish to npm later: set npmPublish:true in
      # .releaserc, create an npm Automation token, add it as the NPM_TOKEN secret,
      # and add `NPM_TOKEN` / `NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}` env here.
      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
