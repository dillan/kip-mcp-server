name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          registry-url: 'https://registry.npmjs.org'
      # npm Trusted Publishing (OIDC) needs npm >= 11.5.1.
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build
      - run: npm run test:coverage
      # Publishes via npm Trusted Publishing (OIDC) — no NPM_TOKEN. semantic-release
      # exchanges the GitHub Actions OIDC token (id-token: write) for a short-lived npm
      # token and publishes with provenance automatically. This needs a Trusted Publisher
      # configured on the npm package first — see docs/publishing.md.
      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
